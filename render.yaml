services:
  - type: web
    name: bias-auditor-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: backend
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-exp
